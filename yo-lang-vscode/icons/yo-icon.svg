<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c3d99" />
      <stop offset="100%" stop-color="#2d1c4d" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#grad)" />
  
  <!-- Inner Border for Depth -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" />
  
  <!-- Bold text "YO" -->
  <text x="64" y="79" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="44" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="-1">YO</text>
</svg>
